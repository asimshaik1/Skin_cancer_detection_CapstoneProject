<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SkinCare AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="../static/css/style.css" rel="stylesheet">
    <link href="../static/css/auth.css" rel="stylesheet">
</head>

<body>

    <div class="auth-page">
        <!-- Centered form panel -->
        <div class="auth-form-panel">
            <div class="auth-card wide reveal">
                <div class="auth-header" style="text-align: center;">
                    <small><i class="fas fa-user-plus"></i> &nbsp; New here?</small>
                    <h2>Create Account</h2>
                    <p>Set up your free account to start using our AI screening tools.</p>
                </div>

                {% if message %}
                <div style="color: red; text-align: center; margin-bottom: 1rem;" role="alert">
                    {{ message }}
                </div>
                {% endif %}

                <form id="signupForm" action="/signup" method="POST">
                    <div class="input-row">
                        <div class="input-group">
                            <i class="fas fa-user field-icon"></i>
                            <input type="text" name="user" placeholder="Username" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-id-card field-icon"></i>
                            <input type="text" name="name" placeholder="Full Name" required>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <i class="fas fa-envelope field-icon"></i>
                            <input type="email" name="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-phone field-icon"></i>
                            <input type="tel" name="mobile" placeholder="Mobile Number" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" id="signupPass" name="password" placeholder="Password" required>
                        <i class="fas fa-eye toggle-pass" id="toggleSignup"></i>
                    </div>

                    <button type="submit" class="btn btn-primary btn-auth">
                        <i class="fas fa-arrow-right"></i> &nbsp; Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="/login">Sign In</a></p>
                    <div style="margin-top: 1.5rem; border-top: 1px solid var(--clr-border); padding-top: 1.5rem;">
                        <a href="/" style="color: var(--clr-muted); font-weight: 500;">
                            <i class="fas fa-arrow-left"></i> &nbsp; Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../static/js/main.js"></script>
    <script>
        const toggleBtn = document.getElementById('toggleSignup');
        const passInput = document.getElementById('signupPass');
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.classList.toggle('fa-eye');
            toggleBtn.classList.toggle('fa-eye-slash');
        });
    </script>
</body>

</html>
